name: Build V7A Stable Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build armeabi-v7a stable APK
    runs-on: 'ubuntu-24.04'
    steps:
      - name: Clone repo
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Get version info
        id: vars
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "RUN_NUMBER=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build armeabi-v7a debug APK
        run: ./gradlew assembleDebug --no-daemon -PsplitApk=false

      - name: Rename and collect APK
        run: |
          set -e
          mkdir -p release_apks
          cp app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk \
             "release_apks/Anikku-v7a-stable-${{ steps.vars.outputs.DATE }}-r${{ steps.vars.outputs.RUN_NUMBER }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          tag_name: v7a-stable-${{ steps.vars.outputs.DATE }}-r${{ steps.vars.outputs.RUN_NUMBER }}
          name: Anikku V7A Stable ${{ steps.vars.outputs.DATE }} (Run ${{ steps.vars.outputs.RUN_NUMBER }})
          body: |
            Automated **armeabi-v7a** stable APK build.

            - Commit: `${{ steps.vars.outputs.SHORT_SHA }}`
            - Date: `${{ steps.vars.outputs.DATE }}`
            - Run: `#${{ steps.vars.outputs.RUN_NUMBER }}`

            Download the APK below.
          files: release_apks/*.apk
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
